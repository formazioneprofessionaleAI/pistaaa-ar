<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Pistaaa AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: Arial, sans-serif; background: #000; }

    /* LOADING */
    #loading {
      position: fixed;
      inset: 0;
      background: #1B4332;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      text-align: center;
      padding: 20px;
    }
    #loading h2 { font-size: 22px; margin-bottom: 10px; letter-spacing: 2px; }
    #loading p  { font-size: 14px; opacity: 0.7; margin-top: 16px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HINT */
    #scan-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #scan-hint.hidden { opacity: 0; }

    /* OVERLAY */
    #overlay {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px;
      z-index: 1000;
      text-align: center;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.25);
    }
    #overlay.active { display: block; }

    #overlay-handle {
      width: 40px; height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    #opera-badge {
      display: inline-block;
      background: #E8F5E9;
      color: #2E7D32;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #opera-nome {
      font-size: 24px;
      font-weight: bold;
      color: #1B4332;
      margin-bottom: 6px;
    }

    #opera-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    #btn-scopri {
      display: block;
      background: #2E7D32;
      color: white;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 14px;
      transition: background 0.2s;
    }
    #btn-scopri:active { background: #1B4332; }

    #btn-chiudi {
      background: none;
      border: none;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      padding: 8px;
    }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <h2>PISTAAA!</h2>
  <p>La Blue Way Piemontese</p>
  <div class="spinner"></div>
  <p>Caricamento fotocamera...</p>
</div>

<!-- SCAN HINT -->
<div id="scan-hint">📷 Inquadra un cartello Pistaaa</div>

<!-- OVERLAY OPERA TROVATA -->
<div id="overlay">
  <div id="overlay-handle"></div>
  <div id="opera-badge">Terzo Paradiso ♾</div>
  <div id="opera-nome"></div>
  <div id="opera-subtitle">Opera sul percorso Pistaaa</div>
  <a id="btn-scopri" href="#" target="_self">Scopri l'opera sul sito</a>
  <button id="btn-chiudi">Continua a esplorare</button>
</div>

<!-- AR SCENE -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0"  link-handler="index: 0"></a-entity>
  <a-entity mindar-image-target="targetIndex: 1"  link-handler="index: 1"></a-entity>
  <a-entity mindar-image-target="targetIndex: 2"  link-handler="index: 2"></a-entity>
  <a-entity mindar-image-target="targetIndex: 3"  link-handler="index: 3"></a-entity>
  <a-entity mindar-image-target="targetIndex: 4"  link-handler="index: 4"></a-entity>
  <a-entity mindar-image-target="targetIndex: 5"  link-handler="index: 5"></a-entity>
  <a-entity mindar-image-target="targetIndex: 6"  link-handler="index: 6"></a-entity>
  <a-entity mindar-image-target="targetIndex: 7"  link-handler="index: 7"></a-entity>
  <a-entity mindar-image-target="targetIndex: 8"  link-handler="index: 8"></a-entity>
  <a-entity mindar-image-target="targetIndex: 9"  link-handler="index: 9"></a-entity>
  <a-entity mindar-image-target="targetIndex: 10" link-handler="index: 10"></a-entity>
  <a-entity mindar-image-target="targetIndex: 11" link-handler="index: 11"></a-entity>
  <a-entity mindar-image-target="targetIndex: 12" link-handler="index: 12"></a-entity>
  <a-entity mindar-image-target="targetIndex: 13" link-handler="index: 13"></a-entity>
  <a-entity mindar-image-target="targetIndex: 14" link-handler="index: 14"></a-entity>
  <a-entity mindar-image-target="targetIndex: 15" link-handler="index: 15"></a-entity>
  <a-entity mindar-image-target="targetIndex: 16" link-handler="index: 16"></a-entity>
  <a-entity mindar-image-target="targetIndex: 17" link-handler="index: 17"></a-entity>
  <a-entity mindar-image-target="targetIndex: 18" link-handler="index: 18"></a-entity>
  <a-entity mindar-image-target="targetIndex: 19" link-handler="index: 19"></a-entity>
  <a-entity mindar-image-target="targetIndex: 20" link-handler="index: 20"></a-entity>
  <a-entity mindar-image-target="targetIndex: 21" link-handler="index: 21"></a-entity>
  <a-entity mindar-image-target="targetIndex: 22" link-handler="index: 22"></a-entity>
  <a-entity mindar-image-target="targetIndex: 23" link-handler="index: 23"></a-entity>
  <a-entity mindar-image-target="targetIndex: 24" link-handler="index: 24"></a-entity>
  <a-entity mindar-image-target="targetIndex: 25" link-handler="index: 25"></a-entity>
  <a-entity mindar-image-target="targetIndex: 26" link-handler="index: 26"></a-entity>
  <a-entity mindar-image-target="targetIndex: 27" link-handler="index: 27"></a-entity>
</a-scene>

<script>
  // ── DATI OPERE ──────────────────────────────────────────────
  const opere = [
    { nome: "Pistaaa",                url: "https://pistaaa.org/" },
    { nome: "Andezeno",               url: "https://pistaaa.org/andezeno/" },
    { nome: "Aramengo",               url: "https://pistaaa.org/aramengo/" },
    { nome: "Arignano",               url: "https://pistaaa.org/arignano/" },
    { nome: "Berzano di San Pietro",  url: "https://pistaaa.org/berzano-di-san-pietro/" },
    { nome: "Buttigliera d'Asti",     url: "https://pistaaa.org/buttigliera-dasti/" },
    { nome: "Cambiano",               url: "https://pistaaa.org/cambiano/" },
    { nome: "Carmagnola",             url: "https://pistaaa.org/carmagnola/" },
    { nome: "Casalborgone",           url: "https://pistaaa.org/casalborgone/" },
    { nome: "Castagneto Po",          url: "https://pistaaa.org/castagneto-po/" },
    { nome: "Castelnuovo Don Bosco",  url: "https://pistaaa.org/castelnuovo-don-bosco/" },
    { nome: "Chieri",                 url: "https://pistaaa.org/chieri/" },
    { nome: "La Loggia",              url: "https://pistaaa.org/la-loggia/" },
    { nome: "Marentino",              url: "https://pistaaa.org/marentino/" },
    { nome: "Mombello di Torino",     url: "https://pistaaa.org/mombello-di-torino/" },
    { nome: "Montaldo Torinese",      url: "https://pistaaa.org/montaldo-torinese/" },
    { nome: "Moriondo",               url: "https://pistaaa.org/moriondo/" },
    { nome: "Pavarolo",               url: "https://pistaaa.org/pavarolo/" },
    { nome: "Pecetto",                url: "https://pistaaa.org/pecetto/" },
    { nome: "Pino Torinese",          url: "https://pistaaa.org/pino-torinese/" },
    { nome: "Riva presso Chieri",     url: "https://pistaaa.org/riva-presso-chieri/" },
    { nome: "Rivalba",                url: "https://pistaaa.org/rivalba/" },
    { nome: "San Sebastiano da Po",   url: "https://pistaaa.org/san-sebastiano-da-po/" },
    { nome: "San Raffaele Cimena",    url: "https://pistaaa.org/san-raffaele-cimena/" },
    { nome: "Santena",                url: "https://pistaaa.org/santena/" },
    { nome: "Trofarello",             url: "https://pistaaa.org/trofarello/" },
    { nome: "Villanova d'Asti",       url: "https://pistaaa.org/villanova-dasti/" },
    { nome: "Villastellone",          url: "https://pistaaa.org/villastellone/" }
  ];

  // ── COMPONENTE LINK HANDLER ──────────────────────────────────
  AFRAME.registerComponent('link-handler', {
    schema: { index: { type: 'number' } },
    init: function () {
      const idx = this.data.index;
      this.el.addEventListener('targetFound', () => {
        mostraOverlay(idx);
      });
    }
  });

  // ── OVERLAY ──────────────────────────────────────────────────
  function mostraOverlay(idx) {
    const opera = opere[idx];
    document.getElementById('opera-nome').textContent = opera.nome;
    document.getElementById('btn-scopri').href = opera.url;
    document.getElementById('overlay').classList.add('active');
    document.getElementById('scan-hint').classList.add('hidden');
  }

  document.getElementById('btn-chiudi').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('scan-hint').classList.remove('hidden');
  });

  // ── AVVIO SCENA ───────────────────────────────────────────────
  document.querySelector('a-scene').addEventListener('loaded', () => {
    const scene = document.querySelector('a-scene');
    scene.systems['mindar-image-system'].start();
    document.getElementById('loading').style.display = 'none';
  });
</script>

</body>
</html>
